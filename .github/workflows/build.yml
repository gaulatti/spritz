name: Deploy Spritz

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.DEPLOYMENT_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -t ghcr.io/${{ github.repository }}:latest .

      - name: Push Docker image to GHCR
        run: |
          docker push ghcr.io/${{ github.repository }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to on-premises host
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            sh -c '
            docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.DEPLOYMENT_TOKEN }}
            docker pull ghcr.io/${{ github.repository }}:latest

            docker stop spritz || true
            docker rm spritz || true

            LOG_STREAM_UUID=$(uuidgen)

            docker run -d --name spritz \
            -p ${{ vars.HTTP_PORT }}:80 \
            -e AWS_REGION=${{ vars.AWS_REGION }} \
            -e APP_SECRET_ARN="${{ secrets.APP_SECRET_ARN }}" \
            -e APP_SECRET_KEY="${{ secrets.APP_SECRET_KEY }}" \
            -e ENV=production \
            --restart=always \
            --log-driver=awslogs \
            --log-opt awslogs-region=${{ vars.AWS_REGION }} \
            --log-opt awslogs-group=${{ vars.LOGS_GROUP }} \
            --log-opt awslogs-stream="$LOG_STREAM_UUID" \
            -v ~/.aws:/root/.aws:ro \
            -v spritz-uploads:/var/www/html/wordpress/wp-content/uploads \
            ghcr.io/${{ github.repository }}:latest
            '
